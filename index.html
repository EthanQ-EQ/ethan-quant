<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>乙烷量子 - AI量化股票系统</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 顶部品牌 -->
    <div class="header">

        <div class="logo">
            📈 Ethan Quant
        </div>

        <div class="subtitle">
            乙烷量子 · AI Quantitative Stock System
        </div>

        <div class="version">
            Version 0.8
        </div>

    </div>

    <div class="container">

     <!-- 市场温度 -->
<div class="card">

    <div class="title">
        📈 市场温度
    </div>

    <div class="score" id="marketTemp">
        --
    </div>

    <p id="marketLevel">
        正在获取市场数据...
    </p>

    <hr>

<div class="market-score">

    <div class="score-item">
        <span>📈 上证指数</span>
        <strong id="score-shanghai">-- / 20</strong>
    </div>

    <div class="score-item">
        <span>📊 深创指数</span>
        <strong id="score-sz">-- / 20</strong>
    </div>

</div>
        </div>

        <!-- 今日 Top3 -->
      <div class="card">

    <div class="title">
        🔥 今日 AI 推荐
    </div>

    <div id="top3">

        正在计算 AI 推荐...

    </div>

</div>

        <!-- AI观点 -->
        <div class="card">

            <div class="title">
                🤖 AI 今日观点
            </div>

            <p>
                半导体板块今日强于大盘，建议关注成交量持续放大的个股，不建议追高连续大涨股票。
            </p>

        </div>

        <!-- 股票搜索 -->
        <div class="card">

            <div class="title">
                🔍 股票搜索
            </div>

            <input
                id="stockCode"
                type="text"
                placeholder="输入股票代码，例如：002428"
                onkeydown="handleKey(event)"
            >

            <button onclick="searchStock()">
                查询
            </button>

            <div id="result"></div>

        </div>

        <!-- 我的自选 -->
        <div class="card">

            <div class="title">
                ⭐ 我的自选
            </div>

            <div id="favorites">
                暂无自选股票
            </div>

        </div>

    </div>

    <script src="stocks.js"></script>
    <!-- ===========================
AI分析弹窗 V1.1
=========================== -->

<div id="aiModal" class="ai-modal">

    <div class="ai-box">

    <div class="ai-header">

    <button
        class="ai-close"
        onclick="closeAI()">
        ✕
    </button>

    <div class="ai-title">

        <div class="gemini-title">
            Google Gemini
        </div>

        <div class="gemini-subtitle">
            AI 智能分析结果
        </div>

    </div>

</div>

        <div
            id="aiContent"
            class="ai-content">

            AI 正在分析...

        </div>

    </div>

</div>
    <script src="script.js"></script>

</body>

</html>
