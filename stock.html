<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>股票详情</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<button
onclick="history.back()"
class="ai-btn"
style="margin-bottom:20px;">

← 返回

</button>

<div class="stock-header">

<h1 id="stockName">加载中...</h1>

<div id="stockPrice"></div>

</div>

<div
class="stock-card">

<div id="stockInfo"></div>

</div>

<div
class="stock-card">

<h2>📈 K线</h2>

<div id="kline">

即将接入东方财富K线

</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

async function loadStock(){

    const res = await fetch("/api/stock?code=" + code);

    const stock = await res.json();

    const color =
        Number(stock.change) >= 0
        ? "#ef4444"
        : "#22c55e";

   document.getElementById("stockName").innerHTML =
`
${stock.name}
<br>
<span style="font-size:22px;color:#999;">
${stock.code}
</span>
`;

document.getElementById("stockPrice").innerHTML =
`
<h1 style="color:${color};font-size:60px;margin:0;">
¥${stock.price}
</h1>

<div style="color:${color};font-size:26px;">

${stock.change}

(${stock.changePercent}%)

</div>
`;

document.getElementById("stockInfo").innerHTML = `

<h2 style="color:${color};font-size:52px;">
¥${stock.price}
</h2>

<p style="color:${color};font-size:26px;">
${stock.change}
(${stock.changePercent}%)
</p>

<hr>

<table style="width:100%;font-size:22px;line-height:2.4;">

<tr>

<td>今开</td>

<td>${stock.open}</td>

<td>昨收</td>

<td>${stock.yesterday}</td>

</tr>

<tr>

<td>最高</td>

<td>${stock.high}</td>

<td>最低</td>

<td>${stock.low}</td>

</tr>

<tr>

<td>成交量</td>

<td>${stock.volume}</td>

<td>成交额</td>

<td>${stock.amount}</td>

</tr>

</table>

`;

}

loadStock();

</script>

</body>
</html>
