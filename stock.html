<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>股票详情</title>

<link rel="stylesheet" href="style.css">

<style>

.stock-header{
    margin-bottom:25px;
}

.stock-code{
    color:#8b93a7;
    font-size:18px;
    margin-top:6px;
}

.stock-price{
    font-size:52px;
    font-weight:700;
    margin:20px 0 8px;
}

.stock-change{
    font-size:22px;
    font-weight:600;
}

.stock-card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:22px;
    margin-top:20px;
}

.info-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:16px;

}

.info-item{

    background:#131b31;

    border-radius:14px;

    padding:16px;

}

.info-title{

    color:#8b93a7;

    font-size:14px;

    margin-bottom:8px;

}

.info-value{

    color:#fff;

    font-size:22px;

    font-weight:600;

}

.k-tabs{

display:flex;

gap:10px;

margin-bottom:18px;

}

.k-btn{

flex:1;

height:42px;

border:none;

border-radius:12px;

background:#131b31;

color:#8b93a7;

font-size:15px;

font-weight:600;

}

.k-btn.active{

background:#3b4d85;

color:#fff;

}

#kline{

height:420px;

width:100%;

border-radius:16px;

background:#131b31;

overflow:hidden;

}
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

</head>

<body>

<div class="container">

<button
class="ai-btn"
onclick="history.back()"
style="margin-bottom:20px;">

← 返回

</button>

<div class="stock-header">

<h1 id="stockName">加载中...</h1>

<div
id="stockCode"
class="stock-code">
</div>

<div
id="stockPrice"
class="stock-price">
</div>

<div
id="stockChange"
class="stock-change">
</div>

</div>

<div class="stock-card">

<div
class="info-grid"
id="stockInfo">

</div>

</div>

<div class="stock-card">

<div class="k-tabs">

<button class="k-btn" onclick="loadKline('minute',this)">分时</button>

<button class="k-btn active" onclick="loadKline('day',this)">日K</button>

<button class="k-btn" onclick="loadKline('week',this)">周K</button>

<button class="k-btn" onclick="loadKline('month',this)">月K</button>
</div>

<div id="kline"></div>

</div>
</div>

<script>

const params=new URLSearchParams(location.search);

const code=params.get("code");

async function loadStock(){

const res=await fetch("/api/stock?code="+code);

const stock=await res.json();

const color=
Number(stock.change)>=0
?"#ef4444"
:"#22c55e";

document.getElementById("stockName").innerText=
stock.name;

document.getElementById("stockCode").innerText=
stock.code;

document.getElementById("stockPrice").innerHTML=
`<span style="color:${color};">
¥${stock.price}
</span>`;

document.getElementById("stockChange").innerHTML=
`<span style="color:${color};">
${stock.change}
（${stock.changePercent}%）
</span>`;

document.getElementById("stockInfo").innerHTML=`

<div class="info-item">
<div class="info-title">今开</div>
<div class="info-value">${stock.open}</div>
</div>

<div class="info-item">
<div class="info-title">昨收</div>
<div class="info-value">${stock.yesterday}</div>
</div>

<div class="info-item">
<div class="info-title">最高</div>
<div class="info-value">${stock.high}</div>
</div>

<div class="info-item">
<div class="info-title">最低</div>
<div class="info-value">${stock.low}</div>
</div>

<div class="info-item">
<div class="info-title">成交量</div>
<div class="info-value">${(stock.volume/10000).toFixed(2)} 万手</div>
</div>

<div class="info-item">
<div class="info-title">成交额</div>
<div class="info-value">${(stock.amount/100000000).toFixed(2)} 亿元</div>
</div>

<div class="info-item">
<div class="info-title">均价</div>
<div class="info-value">${stock.averagePrice ?? "--"}</div>
</div>

<div class="info-item">
<div class="info-title">振幅</div>
<div class="info-value">${stock.amplitude ?? "--"}%</div>
</div>

<div class="info-item">
<div class="info-title">换手率</div>
<div class="info-value">${stock.turnoverRate ?? "--"}%</div>
</div>

<div class="info-item">
<div class="info-title">量比</div>
<div class="info-value">${stock.volumeRatio ?? "--"}</div>
</div>

<div class="info-item">
<div class="info-title">涨停价</div>
<div class="info-value">
${stock.limitUp ?? "--"}
</div>
</div>

<div class="info-item">
<div class="info-title">跌停价</div>
<div class="info-value">
${stock.limitDown ?? "--"}
</div>
</div>

<div class="info-item">
<div class="info-title">外盘</div>
<div class="info-value">
${stock.outsideVolume ? (stock.outsideVolume/10000).toFixed(2)+" 万" : "--"}
</div>
</div>

<div class="info-item">
<div class="info-title">市盈率</div>
<div class="info-value">
${stock.pe ?? "--"}
</div>
</div>

`;

}

const chart = echarts.init(document.getElementById("kline"));

async function loadKline(type,btn){

    if(btn){

        document.querySelectorAll(".k-btn").forEach(i=>i.classList.remove("active"));

        btn.classList.add("active");

    }

    const map={

        minute:"day",

        day:"day",

        week:"week",

        month:"month"

    };

    const res=await fetch(`/api/kline?code=${code}&type=${map[type]}`);

    const json=await res.json();

    if(!json.success){

        document.getElementById("kline").innerHTML="K线加载失败";

        return;

    }

  const data=json.data;

function calcMA(day){

    const result=[];

    for(let i=0;i<data.length;i++){

        if(i<day-1){
            result.push("-");
            continue;
        }

        let sum=0;

        for(let j=0;j<day;j++){
            sum+=data[i-j].close;
        }

        result.push((sum/day).toFixed(2));

    }

    return result;

}

chart.setOption({

        backgroundColor:"#131b31",

        animation:false,

        grid:{

            left:45,

            right:20,

            top:20,

            bottom:35

        },

        xAxis:{

            type:"category",

            data:data.map(i=>i.date),

            axisLabel:{color:"#888"}

        },

        yAxis:{

            scale:true,

            axisLabel:{color:"#888"}

        },

series:[

{

    type:"candlestick",

    data:data.map(i=>[
        i.open,
        i.close,
        i.low,
        i.high
    ]),

    itemStyle:{
        color:"#ef4444",
        color0:"#22c55e",
        borderColor:"#ef4444",
        borderColor0:"#22c55e"
    }

},

{

    name:"MA5",

    type:"line",

    data:calcMA(5),

    symbol:"none"

},

{

    name:"MA10",

    type:"line",

    data:calcMA(10),

    symbol:"none"

},

{

    name:"MA20",

    type:"line",

    data:calcMA(20),

    symbol:"none"

}

]

    });

}

loadStock();

loadKline("day");

</script>

</body>

</html>
