<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>股票详情</title>

<link rel="stylesheet" href="style.css">

<style>

.stock-header{
    margin-bottom:25px;
}

.stock-code{
    color:#8b93a7;
    font-size:18px;
    margin-top:6px;
}

.stock-price{
    font-size:52px;
    font-weight:700;
    margin:20px 0 8px;
}

.stock-change{
    font-size:22px;
    font-weight:600;
}

.stock-card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:22px;
    margin-top:20px;
}

.info-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:16px;

}

.info-item{

    background:#131b31;

    border-radius:14px;

    padding:16px;

}

.info-title{

    color:#8b93a7;

    font-size:14px;

    margin-bottom:8px;

}

.info-value{

    color:#fff;

    font-size:22px;

    font-weight:600;

}

#kline{

    height:320px;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#8b93a7;

    font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<button
class="ai-btn"
onclick="history.back()"
style="margin-bottom:20px;">

← 返回

</button>

<div class="stock-header">

<h1 id="stockName">加载中...</h1>

<div
id="stockCode"
class="stock-code">
</div>

<div
id="stockPrice"
class="stock-price">
</div>

<div
id="stockChange"
class="stock-change">
</div>

</div>

<div class="stock-card">

<div
class="info-grid"
id="stockInfo">

</div>

</div>

<div class="stock-card">

<h2 style="margin-top:0;">K线</h2>

<div id="kline">

即将接入东方财富K线

</div>

</div>

</div>

<script>

const params=new URLSearchParams(location.search);

const code=params.get("code");

async function loadStock(){

const res=await fetch("/api/stock?code="+code);

const stock=await res.json();

const color=
Number(stock.change)>=0
?"#ef4444"
:"#22c55e";

document.getElementById("stockName").innerText=
stock.name;

document.getElementById("stockCode").innerText=
stock.code;

document.getElementById("stockPrice").innerHTML=
`<span style="color:${color};">
¥${stock.price}
</span>`;

document.getElementById("stockChange").innerHTML=
`<span style="color:${color};">
${stock.change}
（${stock.changePercent}%）
</span>`;

document.getElementById("stockInfo").innerHTML=`

<div class="info-item">
<div class="info-title">今开</div>
<div class="info-value">${stock.open}</div>
</div>

<div class="info-item">
<div class="info-title">昨收</div>
<div class="info-value">${stock.yesterday}</div>
</div>

<div class="info-item">
<div class="info-title">最高</div>
<div class="info-value">${stock.high}</div>
</div>

<div class="info-item">
<div class="info-title">最低</div>
<div class="info-value">${stock.low}</div>
</div>

<div class="info-item">
<div class="info-title">成交量</div>
<div class="info-value">
${(stock.volume/10000).toFixed(2)} 万手
</div>
</div>

<div class="info-item">
<div class="info-title">成交额</div>
<div class="info-value">
${(stock.amount/100000000).toFixed(2)} 亿元
</div>
</div>

`;

}

loadStock();

</script>

</body>

</html>
