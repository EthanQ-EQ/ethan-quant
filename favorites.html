<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ethan Quant - AI量化股票系统</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 顶部品牌 -->
<div class="header">

    <img
        src="banner.png.png"
        class="banner"
        alt="Ethan Quant">

</div>
    <div class="container">

        <!-- 我的自选 -->
        <div class="card">

           <div class="favorites-header">

    <div class="title">
        我的自选
    </div>

   <button
    id="refreshFavorites"
    class="refresh-btn"
    onclick="refreshFavorites()"
    title="刷新">

    <svg
        class="refresh-icon"
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">

        <path d="M21 2v6h-6"></path>

        <path d="M20.49 15A9 9 0 1 1 21 8"></path>

    </svg>

</button>

</div>

<div id="favorites">
    暂无自选股票
</div>

        </div>

    </div>

    <script src="stocks.js"></script>
    <!-- ===========================
AI分析弹窗 V1.1
=========================== -->

<div id="aiModal" class="ai-modal">

    <div class="ai-box">

    <div class="ai-header">

    <button
        class="ai-close"
        onclick="closeAI()">
        ✕
    </button>

    <div class="ai-title">

        <div class="gemini-title">
            Ethan Quant AI
        </div>

        <div class="gemini-subtitle">
            AI 智能分析结果
        </div>

    </div>

</div>

        <div
            id="aiContent"
            class="ai-content">

            AI 正在分析...

        </div>

    </div>

</div>

<!-- 提示弹窗 -->
<div id="msgModal" class="ai-modal" style="display:none;">

    <div class="ai-box">

        <div class="ai-header">

            <button
                class="ai-close"
                onclick="closeMsg()">
                ✕

            </button>

            <div class="ai-title">

                <div class="gemini-title">
                    Ethan Quant
                </div>

                <div class="gemini-subtitle">
                    系统提示
                </div>

            </div>

        </div>

        <div
            id="msgContent"
            class="ai-content">

        </div>

    </div>

</div>
